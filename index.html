<html>
    <script>
        function addTodo(){
            const title = document.getElementById("title").value
            const description = document.getElementById("description").value
            // console.log(title)
            const originalHtml = document.getElementById("container").innerHTML
            document.getElementById("container").innerHTML = originalHtml+`
                <div>
                    <div>${title}</div>
                    <div>${description}</div>
                    <button>Mark as done</button>
                </div>
            `
        }
    </script>
    <div>
        <input type="text" id="title" placeholder="title" name="" id="">
        <br></br>
        <input type="text" id="description" placeholder="description" name="" id="">
        <br></br>
        <button onclick="addTodo()">Add todo</button>
        <div id="container">

        </div>
    </div>
</html>
